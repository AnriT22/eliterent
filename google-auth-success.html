<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing in...</title>
    <style>
        body {
            margin: 0; display: flex; align-items: center; justify-content: center;
            min-height: 100vh; background: #0a0e1a; color: #fff;
            font-family: 'Poppins', sans-serif;
        }
        .container { text-align: center; }
        .spinner {
            width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #4285F4; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { font-size: 20px; font-weight: 600; margin: 0 0 8px; }
        p { font-size: 14px; color: #A0A3B0; margin: 0; }
        .error { color: #f87171; }
    </style>
    <script src="i18n.js"></script>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2 id="statusText">Signing you in...</h2>
        <p id="subText">Please wait</p>
    </div>
    <script>
        (function() {
            try {
                var params = new URLSearchParams(window.location.search);
                var token = params.get('token');
                var userStr = params.get('user');
                var isNew = params.get('new');

                if (!token || !userStr) {
                    document.getElementById('statusText').textContent = 'Authentication failed';
                    document.getElementById('subText').textContent = 'Missing authentication data';
                    document.getElementById('subText').className = 'error';
                    setTimeout(function() { window.location.href = '/login.html'; }, 2000);
                    return;
                }

                var user = JSON.parse(decodeURIComponent(userStr));

                // Store auth data
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(user));
                localStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('isLoggedIn', 'true');

                // Update status
                document.getElementById('statusText').textContent = isNew ? 'Account created!' : 'Welcome back!';
                document.getElementById('subText').textContent = user.full_name || user.email;

                // Clean the URL to remove token from browser history
                if (window.history && window.history.replaceState) {
                    window.history.replaceState({}, '', '/google-auth-success.html');
                }

                // Redirect: new users go to phone verification, existing users go to home
                var role = user.role;
                setTimeout(function() {
                    if (isNew) {
                        // New Google user → phone verification
                        window.location.href = '/verify-phone.html';
                    } else if (role === 'admin') {
                        window.location.href = '/admin.html';
                    } else if (role === 'partner') {
                        window.location.href = '/partner-dashboard.html';
                    } else {
                        window.location.href = '/index.html';
                    }
                }, 1000);

            } catch (err) {
                document.getElementById('statusText').textContent = 'Something went wrong';
                document.getElementById('subText').textContent = err.message;
                document.getElementById('subText').className = 'error';
                setTimeout(function() { window.location.href = '/login.html'; }, 3000);
            }
        })();
    </script>
</body>
</html>
