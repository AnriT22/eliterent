<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | RoyalCar.rent</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .error-container { max-width: 500px; }
        .error-code {
            font-size: 120px;
            font-weight: 800;
            background: linear-gradient(135deg, #c8a961, #e8d48b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 16px;
        }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
        p { color: #94a3b8; font-size: 16px; line-height: 1.6; margin-bottom: 32px; }
        .home-btn {
            display: inline-block;
            padding: 14px 36px;
            background: linear-gradient(135deg, #c8a961, #b8943f);
            color: #0f172a;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(200, 169, 97, 0.3);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <a href="/" class="home-btn">Back to Home</a>
    </div>
</body>
</html>
