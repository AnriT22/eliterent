<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — RoyalCar.rent</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="premium.css">`n    <link rel="stylesheet" href="design.css">
    <link rel="stylesheet" href="auth-luxury.css">
    <script src="api-helper.js"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-left-panel">
            <div class="auth-branding">
                <a href="/" class="auth-logo">
                    <img src="images/logo.png" alt="RoyalCar.rent" class="auth-logo-img">
                    <span class="auth-logo-text">RoyalCar<span style="color:#c8a961">.ge</span></span>
                </a>
                <h1 class="auth-headline">Set New Password</h1>
                <p class="auth-subtext">Enter your new password below to regain access to your account.</p>
            </div>
        </div>
        <div class="auth-right-panel">
            <div class="auth-form-wrapper">
                <h2 class="auth-form-title">Reset Password</h2>

                <div id="resetMsg" style="display:none;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px;"></div>

                <form id="resetForm">
                    <div class="auth-field">
                        <label class="auth-label">New Password</label>
                        <div class="auth-input-wrapper">
                            <input type="password" id="newPassword" class="auth-input" placeholder="Min. 6 characters" required minlength="6">
                        </div>
                    </div>
                    <div class="auth-field">
                        <label class="auth-label">Confirm Password</label>
                        <div class="auth-input-wrapper">
                            <input type="password" id="confirmPassword" class="auth-input" placeholder="Repeat password" required minlength="6">
                        </div>
                    </div>
                    <button type="submit" class="auth-submit-btn" id="resetBtn">Reset Password</button>
                </form>

                <div class="auth-alt-link" style="margin-top:20px;text-align:center;">
                    <a href="login.html" style="color:#c8a961;text-decoration:none;font-size:14px;">Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var token = params.get('token');
        var msgEl = document.getElementById('resetMsg');
        var form = document.getElementById('resetForm');

        function showMsg(text, isError) {
            msgEl.style.display = 'block';
            msgEl.style.background = isError ? '#fef2f2' : '#f0fdf4';
            msgEl.style.color = isError ? '#dc2626' : '#166534';
            msgEl.style.border = '1px solid ' + (isError ? '#fecaca' : '#bbf7d0');
            msgEl.textContent = text;
        }

        if (!token) {
            showMsg('Invalid reset link. Please request a new password reset.', true);
            form.style.display = 'none';
            return;
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            var pw = document.getElementById('newPassword').value;
            var cpw = document.getElementById('confirmPassword').value;

            if (pw.length < 6) { showMsg('Password must be at least 6 characters.', true); return; }
            if (pw !== cpw) { showMsg('Passwords do not match.', true); return; }

            var btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.textContent = 'Resetting...';

            fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, new_password: pw })
            })
            .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
            .then(function(res) {
                if (res.ok) {
                    showMsg(res.data.message || 'Password reset! Redirecting to login...', false);
                    form.style.display = 'none';
                    setTimeout(function() { window.location.href = 'login.html'; }, 2000);
                } else {
                    showMsg(res.data.error || 'Reset failed.', true);
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                }
            })
            .catch(function() {
                showMsg('Network error. Please try again.', true);
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            });
        });
    })();
    </script>
<script src="premium-animations.js"></script>
</body>
</html>
